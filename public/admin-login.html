<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>欧诺造型 | 管理端登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --eucalyptus-green: #7FA998;
            --eucalyptus-light: #F0F4F2;
            --eucalyptus-muted: #A8C3B8;
            --wood-brown: #8D775F;
            --wood-light: #D7CCC8;
            --cream: #FAF9F6;
            --stone: #E5E0D8;
            --sage-dark: #4A5D54;
            --admin-success: #10b981;
            --admin-danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', 'PingFang SC', sans-serif;
            background-color: #F9FBF9;
            background-image: radial-gradient(circle at 2px 2px, rgba(167, 196, 160, 0.1) 1px, transparent 0);
            background-size: 24px 24px;
            color: var(--sage-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(167, 196, 160, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(232, 213, 196, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(167, 196, 160, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        h1, h2, h3, .serif-font {
            font-family: 'Playfair Display', serif;
        }

        .login-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(127, 169, 152, 0.08);
            border: 1px solid var(--stone);
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 2rem;
            color: var(--eucalyptus-green);
            margin-bottom: 8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .logo p {
            color: var(--wood-brown);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: var(--sage-dark);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid var(--stone);
            border-radius: 16px;
            font-size: 0.9rem;
            background: white;
            color: var(--sage-dark);
            transition: all 0.3s;
            ime-mode: auto;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--eucalyptus-green);
            box-shadow: 0 0 0 2px rgba(127, 169, 152, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--eucalyptus-green);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(127, 169, 152, 0.3);
        }

        .login-btn:hover {
            background: #6a9585;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(127, 169, 152, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(254, 226, 226, 0.6);
            color: var(--admin-danger);
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .error-message.show {
            display: block;
        }

        .tips {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--stone);
            font-size: 0.75rem;
            color: var(--wood-brown);
        }

        .tips h3 {
            font-size: 0.8rem;
            color: var(--sage-dark);
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tips ul {
            list-style: none;
            padding-left: 0;
        }

        .tips li {
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
            line-height: 1.6;
        }

        .tips li:before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--eucalyptus-green);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>欧诺造型</h1>
            <p>智慧管理控制台</p>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" lang="zh-CN" inputmode="text">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>

        <div class="tips">
            <h3>登录提示：</h3>
            <ul>
                <li>超级管理员：使用配置的管理员账号</li>
                <li>发型师：使用各自的用户名和密码</li>
                <li>账号信息请咨询系统管理员</li>
            </ul>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (data.success) {
                    // 使用localStorage保存登录信息，实现持久登录
                    localStorage.setItem('sessionId', data.sessionId);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('loginTime', Date.now().toString());
                    if (data.stylistId) {
                        localStorage.setItem('stylistId', data.stylistId);
                        localStorage.setItem('stylistName', data.stylistName);
                    }

                    // 跳转到发型师管理页面
                    if (data.role === 'stylist') {
                        window.location.href = '/admin-stylist.html';
                    } else {
                        errorMsg.textContent = '仅支持发型师登录';
                        errorMsg.classList.add('show');
                    }
                } else {
                    errorMsg.textContent = data.message || '登录失败，请检查用户名和密码';
                    errorMsg.classList.add('show');
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请稍后重试';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
